<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Winner Express</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --dark-green: #1a5f3f;
            --light-green: #4ade80;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
            min-height: 100vh;
        }
        
        .glass-effect {
            background: white;
            border: 1px solid #e5e7eb; /* border-gray-200 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }
        
        .logo-glow {
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--light-green);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <!-- Background Pattern -->

    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-md">
        <div class="glass-effect rounded-2xl shadow-2xl p-8">
            <!-- Logo Section -->
            <div class="text-center mb-8">
                <div class="inline-block mb-4 float-animation">
                    <img src="logowe.jpeg" alt="Winner Express Logo" class="w-24 h-24 rounded-xl shadow-lg logo-glow object-cover">
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">WINNER EXPRESS</h1>
                <p class="text-gray-600">Gestion de Livraisons</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-6">
                    <!-- Username Field -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-user mr-2"></i>Nom d'utilisateur
                        </label>
                        <input type="text" 
                               id="username" 
                               class="input-field w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-green-500"
                               placeholder="Entrez votre nom d'utilisateur"
                               required>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>Mot de passe
                        </label>
                        <div class="relative">
                            <input type="password" 
                                   id="password" 
                                   class="input-field w-full px-4 py-3 pr-12 rounded-lg border border-gray-300 focus:border-green-500"
                                   placeholder="Entrez votre mot de passe"
                                   required>
                            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                <i id="passwordIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="mr-2">
                        <label for="remember" class="text-sm text-gray-600">Se souvenir de moi</label>
                    </div>

                    <!-- Error Message -->
                    <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span id="errorText"></span>
                    </div>

                    <!-- Success Message -->
                    <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
                        <i class="fas fa-check-circle mr-2"></i>
                        Connexion réussie! Redirection...
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition-colors font-semibold flex items-center justify-center">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Se connecter
                    </button>
                </div>
            </form>

            <!-- Footer -->
            <div class="mt-8 text-center text-sm text-gray-500">
                <p>© 2024 Winner Express - Gestion de Livraisons</p>
                <p class="mt-2">
                    <i class="fas fa-shield-alt mr-1"></i>
                    Accès sécurisé
                </p>
            </div>
        </div>

        <!-- Info Card -->
        <div class="mt-6 glass-effect rounded-xl p-4 text-center">
            <p class="text-sm text-gray-600">
                <i class="fas fa-info-circle mr-2"></i>
                Identifiants par défaut : admin / winner2024
            </p>
        </div>
    </div>

    <script>
        // Configuration des identifiants (à changer pour la production)
        const VALID_CREDENTIALS = {
            'admin': 'winner2024',
            'manager': 'express2024',
            'livreur': 'delivery2024'
        };

        // Vérifier si déjà connecté
        function checkAuth() {
            const isAuthenticated = sessionStorage.getItem('authenticated');
            if (isAuthenticated === 'true') {
                window.location.href = 'index.html';
            }
        }

        // Gérer la connexion
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Réinitialiser les messages
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            
            // Valider les identifiants
            if (VALID_CREDENTIALS[username] && VALID_CREDENTIALS[username] === password) {
                // Connexion réussie
                document.getElementById('successMessage').classList.remove('hidden');
                
                // Sauvegarder la session
                sessionStorage.setItem('authenticated', 'true');
                sessionStorage.setItem('username', username);
                
                if (remember) {
                    localStorage.setItem('rememberedUser', username);
                }
                
                // Redirection après 1.5 secondes
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } else {
                // Erreur de connexion
                document.getElementById('errorText').textContent = 'Nom d\'utilisateur ou mot de passe incorrect';
                document.getElementById('errorMessage').classList.remove('hidden');
                
                // Effacer le champ mot de passe
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        // Afficher/masquer le mot de passe
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
            } else {
                passwordField.type = 'password';
                passwordIcon.className = 'fas fa-eye';
            }
        }

        // Se déconnecter
        function logout() {
            sessionStorage.removeItem('authenticated');
            sessionStorage.removeItem('username');
            window.location.href = 'login.html';
        }

        // Charger l'utilisateur mémorisé
        function loadRememberedUser() {
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('remember').checked = true;
                document.getElementById('password').focus();
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadRememberedUser();
        });
    </script>
</body>
</html>
