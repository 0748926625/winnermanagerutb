<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - UTB</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey:            "AIzaSyDEOVQ7Zctxm-e-uckUNopUUHKL8iQ51bk",
        authDomain:        "winnergestionutb.firebaseapp.com",
        projectId:         "winnergestionutb",
        storageBucket:     "winnergestionutb.firebasestorage.app",
        messagingSenderId: "487787959913",
        appId:             "1:487787959913:web:69e58c00ee51152f0cb4f8",
        measurementId:     "G-BP2WPS1DW8"
      };
      firebase.initializeApp(firebaseConfig);
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            min-height: 100vh;
        }
        .glass-effect {
            background: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
        }
        .input-field {
            transition: all 0.3s ease;
            background-color: #f9fafb;
            border: 1px solid #d1d5db;
            color: #1f2937;
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .input-field:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
            background-color: white;
        }
        .btn-login {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,58,237,0.4);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .utb-badge {
            display: inline-block;
            background: #7c3aed;
            color: white;
            font-weight: 900;
            letter-spacing: 0.2em;
            padding: 4px 18px;
            border-radius: 6px;
            font-size: 1.1em;
            margin-bottom: 6px;
        }
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="glass-effect rounded-2xl p-8">

            <!-- Logo + UTB badge -->
            <div class="text-center mb-8">
                <div class="inline-block mb-4 float-animation">
                    <img src="logowe.jpeg" alt="Logo" class="w-24 h-24 rounded-xl shadow-lg object-cover mx-auto">
                </div>
                <div class="utb-badge">UTB</div>
                <h1 class="text-2xl font-black text-gray-800 mt-2">WINNER EXPRESS</h1>
                <p class="text-gray-500 text-sm mt-1">Gestion de Livraisons</p>
            </div>

            <!-- Formulaire -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-5">

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2 text-purple-600"></i>Adresse email
                        </label>
                        <input type="email"
                               id="email"
                               class="input-field"
                               placeholder="votre@email.com"
                               required>
                    </div>

                    <!-- Mot de passe -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2 text-purple-600"></i>Mot de passe
                        </label>
                        <div class="relative">
                            <input type="password"
                                   id="password"
                                   class="input-field"
                                   style="padding-right: 48px;"
                                   placeholder="••••••••"
                                   required>
                            <button type="button" onclick="togglePassword()"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i id="passwordIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Mot de passe oublié -->
                    <div class="text-right">
                        <button type="button" onclick="resetPassword()"
                                class="text-sm text-purple-600 hover:text-purple-800 hover:underline">
                            Mot de passe oublié ?
                        </button>
                    </div>

                    <!-- Message erreur -->
                    <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span id="errorText"></span>
                    </div>

                    <!-- Message succès -->
                    <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm">
                        <i class="fas fa-check-circle mr-2"></i>
                        Connexion réussie ! Redirection…
                    </div>

                    <!-- Message reset -->
                    <div id="resetMessage" class="hidden bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-lg text-sm">
                        <i class="fas fa-paper-plane mr-2"></i>
                        <span id="resetText"></span>
                    </div>

                    <!-- Bouton connexion -->
                    <button type="submit" id="submitBtn"
                            class="btn-login w-full text-white py-3 rounded-xl font-bold text-base">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Se connecter
                    </button>

                </div>
            </form>

            <!-- Footer -->
            <div class="mt-8 text-center text-xs text-gray-400">
                <p>© 2024 Winner Express · UTB</p>
                <p class="mt-1"><i class="fas fa-shield-alt mr-1 text-purple-400"></i>Accès sécurisé Firebase</p>
            </div>
        </div>
    </div>

    <script>
        const auth = firebase.auth();

        // Si déjà connecté → rediriger
        auth.onAuthStateChanged(user => {
            if (user) {
                sessionStorage.setItem('authenticated', 'true');
                sessionStorage.setItem('username', user.email);
                window.location.href = 'index.html';
            }
        });

        async function handleLogin(event) {
            event.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('submitBtn');

            hideMessages();

            // État chargement
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Connexion…';

            try {
                await auth.signInWithEmailAndPassword(email, password);
                document.getElementById('successMessage').classList.remove('hidden');
                // onAuthStateChanged gère la redirection
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Se connecter';
                document.getElementById('password').value = '';
                showError(friendlyError(err.code));
            }
        }

        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            hideMessages();
            if (!email) {
                showError('Entrez votre adresse email pour réinitialiser le mot de passe.');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                document.getElementById('resetText').textContent =
                    `Un email de réinitialisation a été envoyé à ${email}`;
                document.getElementById('resetMessage').classList.remove('hidden');
            } catch (err) {
                showError(friendlyError(err.code));
            }
        }

        function friendlyError(code) {
            const msgs = {
                'auth/user-not-found':    'Aucun compte trouvé avec cet email.',
                'auth/wrong-password':    'Mot de passe incorrect.',
                'auth/invalid-email':     'Adresse email invalide.',
                'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
                'auth/user-disabled':     'Ce compte a été désactivé.',
                'auth/invalid-credential':'Email ou mot de passe incorrect.',
            };
            return msgs[code] || 'Erreur de connexion. Vérifiez vos identifiants.';
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.remove('hidden');
        }

        function hideMessages() {
            ['errorMessage','successMessage','resetMessage'].forEach(id =>
                document.getElementById(id).classList.add('hidden'));
        }

        function togglePassword() {
            const f = document.getElementById('password');
            const i = document.getElementById('passwordIcon');
            if (f.type === 'password') {
                f.type = 'text';
                i.className = 'fas fa-eye-slash';
            } else {
                f.type = 'password';
                i.className = 'fas fa-eye';
            }
        }
    </script>
</body>
</html>
